name: G2B Notice Check

on:
  schedule:
      - cron: '*/30 * * * *'
        workflow_dispatch:

        permissions:
          contents: write

          concurrency:
            group: bid-check
              cancel-in-progress: false

              env:
                G2B_PREBID_API_KEY: ${{ secrets.G2B_PREBID_API_KEY }}
                  G2B_BID_API_KEY: ${{ secrets.G2B_BID_API_KEY }}
                    TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                        SUPER_ADMIN_CHAT_ID: ${{ secrets.SUPER_ADMIN_CHAT_ID }}
                          TZ: Asia/Seoul

                          jobs:
                            check-notices:
                                runs-on: ubuntu-latest
                                    steps:
                                          - name: Checkout
                                                  uses: actions/checkout@v4

                                                        - name: Set up Python
                                                                uses: actions/setup-python@v5
                                                                        with:
                                                                                  python-version: '3.10'
                                                                                            cache: 'pip'

                                                                                                  - name: Install dependencies
                                                                                                          run: |
                                                                                                                    python -m pip install --upgrade pip
                                                                                                                              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                                                                                                                              
                                                                                                                                    - name: Run check
                                                                                                                                            run: python -m src.main
                                                                                                                                            
                                                                                                                                                  - name: Commit state changes
                                                                                                                                                          run: |
                                                                                                                                                                    git config --local user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                              git config --local user.name "github-actions[bot]"
                                                                                                                                                                                        git add data/state/*.json
                                                                                                                                                                                                  git diff --quiet && git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
                                                                                                                                                                                                            git push
                                                                                                                                                                                                            
