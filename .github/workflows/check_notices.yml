name: 나라장터 공고 체크

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bid-telegram-notice-check
  cancel-in-progress: false

jobs:
  check-notices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Update Handler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPER_ADMIN_CHAT_ID: ${{ secrets.SUPER_ADMIN_CHAT_ID }}
        run: python -m src.update_handler

      - name: Run Notice Checker
        id: notice_check
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          G2B_PREBID_API_KEY: ${{ secrets.G2B_PREBID_API_KEY }}
          G2B_BID_API_KEY: ${{ secrets.G2B_BID_API_KEY }}
          G2B_API_KEY: ${{ secrets.G2B_API_KEY || secrets.G2B_BID_API_KEY }}
        run: python -m src.main

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ config/
          git diff --staged --quiet || git commit -m "chore: update state and profiles [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Fail when notice checker failed
        if: steps.notice_check.outcome == 'failure'
        run: exit 1
